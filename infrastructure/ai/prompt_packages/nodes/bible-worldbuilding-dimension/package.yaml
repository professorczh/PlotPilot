name: Bible worldbuilding dimension
category: world
source: application/world/services/auto_bible_generator.py::_generate_dimension()/_stream_dimension()
description: Generate a single worldbuilding dimension (core_rules, geography, society, etc.) based on story premise
builtin: true
tags:
- bible
- worldbuilding
- dimension
output_format: json
variables:
- name: dim_label
  desc: Dimension Chinese label (e.g. 核心法则)
  type: string
  required: true
- name: premise
  desc: Story premise
  type: string
  required: true
- name: target_chapters
  desc: Target chapter count
  type: integer
  required: true
- name: context_block
  desc: Previously generated dimensions context
  type: string
  default: ''
- name: fields_desc
  desc: JSON field definitions for this dimension
  type: string
  required: true
id: bible-worldbuilding-dimension
sort_order: 13
